<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Quan ly Bac si</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2 th:text="${hName}" class="text-primary"></h2>
<hr>
<form th:action="@{/doctors/list}" method="get" class="mb-3 row">
  <div class="col-4"><input name="phone" placeholder="Tim theo so dien thoai..." class="form-control"></div>
  <div class="col-2"><button class="btn btn-dark">Tim kiem</button></div>
</form>

<table class="table table-hover">
  <thead class="table-light">
  <tr>
    <th>Anh</th><th>Ma BS</th><th>Ten</th><th>Chuyen khoa</th><th>Kinh nghiem</th><th>SĐT</th><th>Hanh dong</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="d : ${doctors}">
    <td><img th:src="@{'/images/' + ${d.avatar}}" width="50" class="rounded-circle"></td>
    <td th:text="${d.id}"></td>
    <td th:text="${d.name}"></td>
    <td th:text="${d.specialty}"></td>
    <td th:text="${d.experienceYears} + ' nam'"></td>
    <td th:text="${d.phone}"></td>
    <td><a th:href="@{'/doctors/add'(id=${d.id})}" class="btn btn-sm btn-warning">Sua</a></td>
  </tr>
  </tbody>
</table>
<a th:href="@{/doctors/add}" class="btn btn-success">Them moi Bac si</a>
</body>
</html>
